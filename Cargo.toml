[workspace]
resolver = "3"
members = [
    "crates/proto",
    "crates/core",
    "crates/macros",
    "crates/client",
    "crates/server",
    "crates/store",
    "crates/integration-tests",
]

[workspace.package]
edition = "2024"
version = "0.3.5"
license = "MIT OR Apache-2.0"
repository = "https://github.com/GodlyJaaaj/hermes-rs"
homepage = "https://github.com/GodlyJaaaj/hermes-rs"
documentation = "https://docs.rs/hermes-broker-client"
keywords = ["messaging", "broker", "grpc", "pubsub", "events"]
categories = ["network-programming", "asynchronous"]

[workspace.dependencies]
# Internal crates — version is kept in sync with workspace.package.version
# The `package` field maps the local alias (hermes-macros) to the crate name (hermes-broker-macros)
hermes-macros = { package = "hermes-broker-macros", path = "crates/macros", version = "0.3.5" }
hermes-proto = { package = "hermes-broker-proto", path = "crates/proto", version = "0.3.5" }
hermes-core = { package = "hermes-broker-core", path = "crates/core", version = "0.3.5" }
hermes-store = { package = "hermes-broker-store", path = "crates/store", version = "0.3.5" }
hermes-server = { package = "hermes-broker-server", path = "crates/server", version = "0.3.5" }
hermes-client = { package = "hermes-broker-client", path = "crates/client", version = "0.3.5" }

# External
tonic = "0.14"
tonic-build = "0.14"
tonic-prost = "0.14"
tonic-prost-build = "0.14"
tonic-reflection = "0.14"
prost = "0.14"
prost-types = "0.14"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
tokio-util = "0.7"
serde = { version = "1", features = ["derive"] }
bincode = { version = "2", features = ["serde"] }
dashmap = "6"
uuid = { version = "1", features = ["v7"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"
futures = "0.3"
redb = "3.1"
serde_json = "1"
tempfile = "3"
criterion = { version = "0.8.2", features = ["async_tokio", "html_reports"] }
