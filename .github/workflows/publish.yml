name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Publish in dependency order with sleep to let crates.io index
      - name: Publish hermes-broker-macros
        run: cargo publish -p hermes-broker-macros
      - run: sleep 30

      - name: Publish hermes-broker-proto
        run: cargo publish -p hermes-broker-proto
      - run: sleep 30

      - name: Publish hermes-broker-core
        run: cargo publish -p hermes-broker-core
      - run: sleep 30

      - name: Publish hermes-broker-store
        run: cargo publish -p hermes-broker-store
      - run: sleep 30

      - name: Publish hermes-broker-server
        run: cargo publish -p hermes-broker-server
      - run: sleep 30

      - name: Publish hermes-broker-client
        run: cargo publish -p hermes-broker-client
