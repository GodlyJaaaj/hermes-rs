[package]
name = "hermes-broker-core"
version.workspace = true
edition.workspace = true
description = "Core Hermes event traits, subject types, encoding/decoding helpers, and macros re-exports."
license = "MIT OR Apache-2.0"
repository = "https://github.com/GodlyJaaaj/hermes-rs"
homepage = "https://github.com/GodlyJaaaj/hermes-rs"
documentation = "https://docs.rs/hermes-broker-core"
readme = "../../README.md"
keywords = ["messaging", "broker", "events", "pubsub", "grpc"]
categories = ["network-programming", "asynchronous"]

[dependencies]
hermes-macros = { workspace = true }
serde = { workspace = true }
bincode = { workspace = true }
thiserror = { workspace = true }
serde_json = { workspace = true }

[lib]
name = "hermes_core"

